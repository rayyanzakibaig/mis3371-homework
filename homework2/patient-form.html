<!DOCTYPE html>
<html lang="en">

<!--
Program name: patient-form.html
Author: Rayyan Zakibaig
Version: 2.0
-->

<head>
<meta charset="UTF-8">
<title>PrimeCare Medical Center</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

<script>
function displayDate() {
    document.getElementById("currentDate").innerHTML = new Date().toDateString();
}
</script>

</head>

<body onload="displayDate()">

<div id="header">
<img src="primecare.png" width="90">
<h1>PrimeCare Medical Center</h1>
<p>Today is: <span id="currentDate"></span></p>
</div>

<hr>

<div id="main">
<h2>Patient Registration Form</h2>

<form id="patientForm">

<table>

<tr>
<td>First Name *</td>
<td><input type="text" name="firstname" required></td>

<td>MI</td>
<td><input type="text" name="mi"></td>

<td>Last Name *</td>
<td><input type="text" name="lastname" required></td>
</tr>

<tr>
<td>DOB *</td>
<td><input type="date" name="dob" required></td>
</tr>

<tr>
<td>Email *</td>
<td><input type="email" name="email" required></td>

<td>Phone</td>
<td><input type="tel" name="phone"></td>
</tr>

<tr>
<td>Address *</td>
<td colspan="5"><input type="text" name="address1" required></td>
</tr>

<tr>
<td>City *</td>
<td><input type="text" name="city" required></td>

<td>State *</td>
<td><select name="state" required><option value="">Select</option><option>TX</option></select></td>

<td>Zip *</td>
<td><input type="text" name="zip" required></td>
</tr>

<tr>
<td colspan="6">
<input type="checkbox" name="conditions" value="Chicken Pox"> Chicken Pox
<input type="checkbox" name="conditions" value="Measles"> Measles
<input type="checkbox" name="conditions" value="Mumps"> Mumps
<input type="checkbox" name="conditions" value="Heart Disease"> Heart Disease
<input type="checkbox" name="conditions" value="Covid-19"> Covid-19
</td>
</tr>

<tr>
<td colspan="6">
<input type="radio" name="vaccinated" value="Y"> Vaccinated
<input type="radio" name="vaccinated" value="N"> Not Vaccinated
</td>
</tr>

<tr>
<td colspan="6">
<input type="button" value="Review" onclick="reviewForm()">
</td>
</tr>

</table>

</form>

<div id="reviewSection"></div>

</div>

</body>
</html>
