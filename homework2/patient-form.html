<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>PrimeCare Medical Center</title>

<link rel="stylesheet" href="style.css">
<script src="script.js"></script>

<script>
function displayDate() {
    document.getElementById("currentDate").innerHTML = new Date().toDateString();
}
</script>

<style>
.required {
    color: red;
    font-weight: bold;
}
</style>

</head>

<body onload="displayDate()">

<div id="header">
<img src="primecare.png" width="90">
<h1>PrimeCare Medical Center</h1>
<p>Today is: <span id="currentDate"></span></p>
</div>

<hr>

<div id="main">

<h2>Patient Registration Form</h2>

<form id="patientForm" action="thankyou.html">

<table>

<tr>
<td>First Name <span class="required">*</span></td>
<td><input type="text" name="firstname" required></td>

<td>MI</td>
<td><input type="text" name="mi"></td>

<td>Last Name <span class="required">*</span></td>
<td><input type="text" name="lastname" required></td>
</tr>

<tr>
<td>Date of Birth <span class="required">*</span></td>
<td><input type="date" name="dob" required></td>
</tr>

<tr>
<td>Email <span class="required">*</span></td>
<td><input type="email" name="email" required></td>

<td>Phone</td>
<td><input type="tel" name="phone"></td>
</tr>

<tr>
<td>Address <span class="required">*</span></td>
<td colspan="5"><input type="text" name="address1" required></td>
</tr>

<tr>
<td>City <span class="required">*</span></td>
<td><input type="text" name="city" required></td>

<td>State <span class="required">*</span></td>
<td>
<select name="state" required>
<option value="">Select</option>
<option value="TX">TX</option>
<option value="CA">CA</option>
<option value="NY">NY</option>
<!-- keep your full state list here -->
</select>
</td>

<td>Zip <span class="required">*</span></td>
<td><input type="text" name="zip" required></td>
</tr>

<!-- CHECKBOXES -->
<tr>
<td>Conditions</td>
<td colspan="5">
<input type="checkbox" name="conditions" value="Diabetes"> Diabetes
<input type="checkbox" name="conditions" value="Hypertension"> Hypertension
<input type="checkbox" name="conditions" value="Asthma"> Asthma
<input type="checkbox" name="conditions" value="Heart Disease"> Heart Disease
<input type="checkbox" name="conditions" value="Severe Allergies"> Severe Allergies
<input type="checkbox" name="conditions" value="None"> None
</td>
</tr>

<!-- RADIO GROUPS -->
<tr>
<td>Gender</td>
<td colspan="5">
<input type="radio" name="gender" value="Male"> Male
<input type="radio" name="gender" value="Female"> Female
<input type="radio" name="gender" value="Other"> Other
</td>
</tr>

<tr>
<td>Vaccinated?</td>
<td colspan="5">
<input type="radio" name="vaccinated" value="Y"> Yes
<input type="radio" name="vaccinated" value="N"> No
</td>
</tr>

<tr>
<td>Insurance?</td>
<td colspan="5">
<input type="radio" name="insurance" value="Y"> Yes
<input type="radio" name="insurance" value="N"> No
</td>
</tr>

<tr>
<td colspan="6" align="center">
<input type="button" value="Review" onclick="reviewForm()">
<input type="submit" value="Submit">
<input type="reset" value="Reset">
</td>
</tr>

</table>

</form>

<div id="reviewSection"></div>

</div>

</body>
</html>
